name: build-immortalwrt-r5c

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * *'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master

  FEEDS_CONF: config/immortalwrt.feeds.conf.default
  CONFIG_FILE: config/r5c/immortalwrt.config

  DIY_P1_SH: config/diy-part1.sh
  DIY_P2_SH: config/diy-part2.sh

  WORK_DIR: immortalwrt
  PLATFORM: rockchip
  TZ: Asia/Shanghai

  CCACHE_SIZE: 5G

  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
          ack antlr3 asciidoc autoconf automake autopoint \
          binutils bison build-essential bzip2 \
          ccache clang cmake cpio curl \
          device-tree-compiler ecj fastjar flex gawk gettext \
          git gnutls-dev gperf haveged help2man intltool \
          libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
          libmpc-dev libmpfr-dev libncurses-dev \
          libpython3-dev libreadline-dev libssl-dev \
          libtool libyaml-dev libz-dev \
          lld llvm lrzsz mkisofs msmtp nano ninja-build \
          p7zip p7zip-full patch pkgconf \
          python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons \
          squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd \
          zlib1g-dev zstd

          sudo timedatectl set-timezone "${TZ}"

      - name: Show Environment
        run: |
          uname -a
          df -hT

      - name: Clone ImmortalWrt
        run: |
          git clone \
            --depth=1 \
            --single-branch \
            --branch ${REPO_BRANCH} \
            ${REPO_URL} \
            ${WORK_DIR}

          test -f ${WORK_DIR}/scripts/feeds

      - name: Restore dl Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.WORK_DIR }}/dl
          key: dl-${{ env.REPO_BRANCH }}

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.WORK_DIR }}/.ccache
          key: ccache-${{ env.REPO_BRANCH }}

      - name: Load Custom Feeds
        run: |
          cp -f ${FEEDS_CONF} ${WORK_DIR}/feeds.conf.default

          chmod +x ${DIY_P1_SH}

          cd ${WORK_DIR}

          ${GITHUB_WORKSPACE}/${DIY_P1_SH}

      - name: Update Feeds
        run: |
          cd ${WORK_DIR}

          ./scripts/feeds update -a -f
          ./scripts/feeds install -a

      - name: Load Configuration
        run: |
          cp -f ${CONFIG_FILE} ${WORK_DIR}/.config

          chmod +x ${DIY_P2_SH}

          cd ${WORK_DIR}

          ${GITHUB_WORKSPACE}/${DIY_P2_SH}

      - name: Configure ccache
        run: |
          mkdir -p ${WORK_DIR}/.ccache

          ccache -M ${CCACHE_SIZE}

          ccache -s

      - name: Record Build Start
        run: |
          echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Download Packages
        run: |
          cd ${WORK_DIR}

          make defconfig

          make download -j$(nproc) || true
          make download -j$(nproc) || true
          make download -j$(nproc)

      - name: Show Disk Before Build
        run: |
          df -hT

      - name: Build Firmware
        id: build
        run: |
          cd ${WORK_DIR}

          export PATH="/usr/lib/ccache:$PATH"

          make -j$(nproc)

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Build Statistics
        if: steps.build.outputs.status == 'success'
        run: |
          END=$(date +%s)

          COST=$((END-BUILD_START))

          echo "Build Time: $((COST/60)) Minutes"

          ccache -s

      - name: Organize Files
        id: organize
        if: steps.build.outputs.status == 'success'
        run: |
          cd ${WORK_DIR}/bin/targets/*/*

          rm -rf packages

          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success'
        with:
          name: ImmortalWrt-R5C-${{ github.run_number }}
          path: ${{ env.FIRMWARE }}
          retention-days: 5

      - name: Generate Release Tag
        id: tag
        if: steps.organize.outputs.status == 'success'
        run: |
          echo "release_tag=latest-r5c" >> $GITHUB_OUTPUT

      - name: Upload Release
        uses: ncipollo/release-action@v1
        if: steps.organize.outputs.status == 'success'
        with:
          tag: latest-r5c
          name: Latest NanoPi R5C Build
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: ${{ env.FIRMWARE }}/*
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ImmortalWrt Auto Build

            Device: NanoPi R5C
            Branch: master
            Build Time: ${{ github.run_number }}

      - name: Delete Old Workflow Runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 10
          keep_minimum_runs: 10
          token: ${{ secrets.GH_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          cd ${WORK_DIR}

          rm -rf tmp

          df -hT
