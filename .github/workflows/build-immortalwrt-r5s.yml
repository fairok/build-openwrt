name: build-immortalwrt-r5s

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 0 21 * * *

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  FEEDS_CONF: config/immortalwrt.feeds.conf.default
  CONFIG_FILE: config/r5s/immortalwrt.config
  DIY_P1_SH: config/diy-part1.sh
  DIY_P2_SH: config/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  WORK_DIR: immortalwrt
  PLATFORM: ramips
  CCACHE_SIZE: 5G

jobs:
  build:
    runs-on: ubuntu-22.04-arm   # ✅ 关键优化：ARM 原生编译

    steps:
    - name: Checkout code
      uses: actions/checkout@main
      with:
        fetch-depth: 1

    - name: Free Disk Space (Ubuntu ARM)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Set up dependencies (ARM optimized)
      run: |
        sudo apt update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext git gnutls-dev gperf haveged help2man intltool libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        # ARM Runner 不需要 gcc-multilib 和 libc6-dev-i386（这些是 x86 交叉编译用的）
        sudo apt -y autoremove --purge
        sudo apt clean
        sudo timedatectl set-timezone "${TZ}"
        echo "status=success" >> ${GITHUB_OUTPUT}
        
    - name: Check space usage (initial)
      if: (!cancelled())
      run: |
        echo "=== Initial disk space ==="
        df -hT
        echo "=== Architecture ==="
        uname -m

    - name: Cache ImmortalWRT source (.git)
      uses: actions/cache@v4
      id: cache-source
      with:
        path: ${{ env.WORK_DIR }}/.git
        key: wrt-source-${{ env.REPO_BRANCH }}-${{ hashFiles('config/**') }}
        restore-keys: |
          wrt-source-${{ env.REPO_BRANCH }}-

    - name: Cache toolchain (staging_dir) and ccache
      uses: actions/cache@v4
      id: cache-toolchain
      with:
        path: |
          ${{ env.WORK_DIR }}/staging_dir
          ${{ env.WORK_DIR }}/.ccache
        key: toolchain-arm-${{ env.PLATFORM }}-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE) }}
        restore-keys: |
          toolchain-arm-${{ env.PLATFORM }}-${{ env.REPO_BRANCH }}-
          toolchain-arm-${{ env.PLATFORM }}-

    - name: Clone ImmortalWRT source
      run: |
        if [ -d "${WORK_DIR}/.git" ]; then
          cd ${WORK_DIR}
          git fetch origin ${REPO_BRANCH}
          git checkout ${REPO_BRANCH}
        else
          git clone --depth=1 --branch ${REPO_BRANCH} --single-branch ${REPO_URL} ${WORK_DIR}
        fi

    - name: Copy custom feeds and run diy-part1
      run: |
        cp -f ${FEEDS_CONF} ${WORK_DIR}/feeds.conf.default
        chmod +x ${DIY_P1_SH}
        cd ${WORK_DIR}
        ${GITHUB_WORKSPACE}/${DIY_P1_SH}

    - name: Update feeds
      run: |
        cd ${WORK_DIR}
        ./scripts/feeds update -a -f
        ./scripts/feeds install -a

    - name: Load custom configuration and run diy-part2
      run: |
        cp -f ${CONFIG_FILE} ${WORK_DIR}/.config
        chmod +x ${DIY_P2_SH}
        cd ${WORK_DIR}
        ${GITHUB_WORKSPACE}/${DIY_P2_SH}

    - name: Configure ccache
      run: |
        mkdir -p ${WORK_DIR}/.ccache
        ccache -C || true
        ccache -M ${CCACHE_SIZE}
        echo "ccache max size: $(ccache -s | grep 'max size' | awk '{print $3, $4}')"

    - name: Make defconfig and download packages
      id: package
      run: |
        cd ${WORK_DIR}
        make defconfig
        # 并行下载，失败重试一次
        make download -j$(nproc) -l$(getconf _NPROCESSORS_ONLN) || true
        make download -j$(nproc) -l$(getconf _NPROCESSORS_ONLN) || true
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check space usage before build
      if: steps.package.outputs.status == 'success' && !cancelled()
      run: |
        echo "=== Space before build ==="
        df -hT
        
    - name: Build firmware
      id: build
      run: |
        cd ${WORK_DIR}
        # 使用 ccache 环境变量
        export PATH="/usr/lib/ccache:$PATH"
        # ARM Runner 上 nproc 返回的是 ARM 核心数（通常是 4）
        make -j$(nproc) -l$(getconf _NPROCESSORS_ONLN) V=sc || true
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check build result
      if: steps.build.outputs.status == 'success' && !cancelled()
      run: |
        if [ -d "${WORK_DIR}/bin/targets" ]; then
          echo "Build successful!"
          echo "Generated files:"
          ls -lh ${WORK_DIR}/bin/targets/*/*/*.bin 2>/dev/null || echo "No .bin files found"
          du -sh ${WORK_DIR}/bin/targets/*
        else
          echo "Build failed - no output directory"
          exit 1
        fi

    - name: Organize files
      id: organize
      if: steps.build.outputs.status == 'success' && !cancelled()
      run: |
        cd ${WORK_DIR}/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
          
    - name: Upload firmware directory (artifact)
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_R5S_${{ github.run_number }}
        path: ${{ env.FIRMWARE }}
        retention-days: 5

    - name: Generate release tag
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=R5S-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body: |
          ## ImmortalWrt R5S 固件 (ARM 原生编译)
          - 编译时间: ${{ steps.tag.outputs.release_tag }}
          - 平台: ${{ env.PLATFORM }}
          - 分支: ${{ env.REPO_BRANCH }}
          - 编译架构: ARM Runner (原生编译)
        files: ${{ env.FIRMWARE }}/*

    - name: Delete old workflow runs
      uses: GitRML/delete-workflow-runs@main
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        retain_days: 10
        keep_minimum_runs: 10
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Clean up workspace (preserve cache)
      if: always()
      run: |
        cd ${WORK_DIR}
        # 只清理下载的源码包，保留工具链缓存供下次使用
        rm -rf dl/
        # 清理编译产生的临时文件（保留 staging_dir）
        make clean || true
        df -hT
